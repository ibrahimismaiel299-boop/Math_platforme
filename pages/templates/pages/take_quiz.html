<div dir="rtl" style="font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px;">
    <h2 style="color: #1a73e8;">{{ quiz.title }}</h2>
    <hr>

    {% if score is not None %}
        <div style="background: #d4edda; padding: 20px; border-radius: 10px; text-align: center;">
            <h3>نتيجتك هي: {{ score }} من {{ total }}</h3>
            <a href="{% url 'home' %}">العودة للرئيسية</a>
        </div>
    {% else %}
        <form method="post">
            {% csrf_token %}
            {% for q in quiz.questions.all %}
                <div style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                    <p><strong>{{ forloop.counter }}. {{ q.text }}</strong></p>
                    <input type="radio" name="question_{{ q.id }}" value="1"> {{ q.option1 }} <br>
                    <input type="radio" name="question_{{ q.id }}" value="2"> {{ q.option2 }} <br>
                    <input type="radio" name="question_{{ q.id }}" value="3"> {{ q.option3 }} <br>
                    <input type="radio" name="question_{{ q.id }}" value="4"> {{ q.option4 }}
                </div>
            {% endfor %}
            <button type="submit" style="background: #1a73e8; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer;">إرسال الإجابات</button>
        </form>
    {% endif %}
</div>
