<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة الرياضيات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; border: 1px solid #ddd; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        a { color: #1a73e8; text-decoration: none; font-size: 14px; }
        .errorlist { color: red; list-style: none; padding: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تسجيل الدخول</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">دخول</button>
        </form>
        <p style="margin-top:20px;">ليس لديك حساب؟ <a href="{% url 'signup' %}">سجل حساباً جديداً</a></p>
    </div>
</body>
</html>
